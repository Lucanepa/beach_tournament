<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.adminTitle">Admin – ZuZu Beach Turnier</title>
    <link rel="icon" type="image/png" href="ZuZU.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-page">
    <header class="site-header">
        <div class="container">
            <a href="index.html" class="site-brand">
                <img src="ZuZU.png" alt="ZuZu Beach" class="site-brand-logo">
                <span class="site-brand-text" data-i18n="brand.tagline">Turnier</span>
            </a>
            <div class="header-actions">
                <div class="lang-toggle" id="langToggle" role="group" aria-label="Language">
                    <button type="button" data-lang="de">DE</button>
                    <button type="button" data-lang="en">EN</button>
                </div>
            </div>
        </div>
    </header>
    <div class="container">
        <main class="main-content">
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i>
                <span data-i18n="nav.back">Zurück zur Startseite</span>
            </a>

            <div class="page-header">
                <h2 class="page-title">
                    <i class="fas fa-gear"></i>
                    <span data-i18n="admin.heading">Admin</span>
                </h2>
                <button type="button" id="lockBtn" class="btn btn-secondary admin-hidden" data-i18n="admin.lock">Sperren</button>
            </div>

            <!-- PIN lock screen -->
            <form id="lockForm" class="admin-lock">
                <i class="fas fa-lock admin-lock-icon"></i>
                <label for="pinInput" class="form-group-label" data-i18n="admin.pinLabel">PIN eingeben</label>
                <input type="password" id="pinInput" class="form-input" inputmode="numeric" autocomplete="off" autofocus>
                <p id="pinError" class="admin-error admin-hidden" data-i18n="admin.wrongPin">Falscher PIN</p>
                <button type="submit" class="btn btn-primary" data-i18n="admin.unlock">Entsperren</button>
            </form>

            <!-- Score editor (revealed after unlock) -->
            <section id="scoresPanel" class="scores-panel admin-hidden">
                <div class="section-heading">
                    <h3><i class="fas fa-volleyball-ball"></i> <span data-i18n="admin.scoresHeading">Spielstände</span></h3>
                    <p class="form-hint" data-i18n="admin.scoresHint">Setzergebnisse eingeben – Tableau & Rangliste aktualisieren sich automatisch.</p>
                </div>
                <div id="scoresTournamentWrap" class="tournament-filter">
                    <label for="scoresTournament" data-i18n="filter.tournament">Turnier:</label>
                    <select id="scoresTournament" class="filter-select"></select>
                </div>
                <p id="scoresStatus" class="scores-status" role="status"></p>
                <div id="scoresList" class="scores-list"></div>
            </section>

            <!-- Display settings (revealed after unlock) -->
            <form id="settingsForm" class="settings-form admin-hidden">
                <div class="section-heading">
                    <h3><i class="fas fa-sliders"></i> <span data-i18n="settings.heading">Einstellungen</span></h3>
                </div>
                <div class="form-group">
                    <label for="courtCount" data-i18n="settings.courtCount">Anzahl Courts</label>
                    <input type="number" id="courtCount" class="form-input" min="0" max="50" step="1">
                    <small class="form-hint" data-i18n="settings.courtCountHint">0 = automatisch aus den Daten</small>
                </div>

                <div class="form-group">
                    <label for="refreshSeconds" data-i18n="settings.refresh">Auto-Aktualisierung (Sekunden)</label>
                    <input type="number" id="refreshSeconds" class="form-input" min="3" max="600" step="1">
                </div>

                <div class="form-group">
                    <span class="form-group-label" data-i18n="settings.tournaments">Angezeigte Turniere</span>
                    <label class="check-row"><input type="checkbox" id="tMen" value="men"> <span data-i18n="settings.men">Herren</span></label>
                    <label class="check-row"><input type="checkbox" id="tWomen" value="women"> <span data-i18n="settings.women">Damen</span></label>
                </div>

                <div class="form-group">
                    <span class="form-group-label" data-i18n="settings.defaultLang">Standardsprache</span>
                    <label class="check-row"><input type="radio" name="defaultLang" value="de"> Deutsch (DE)</label>
                    <label class="check-row"><input type="radio" name="defaultLang" value="en"> English (EN)</label>
                </div>

                <div class="form-actions">
                    <button type="button" id="resetBtn" class="btn btn-secondary" data-i18n="settings.reset">Zurücksetzen</button>
                    <button type="submit" id="saveBtn" class="btn btn-primary" data-i18n="settings.save">Speichern</button>
                </div>
            </form>
        </main>
    </div>

    <script src="settings.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
    <script src="admin-scores.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const lockForm = document.getElementById('lockForm');
            const settingsForm = document.getElementById('settingsForm');
            const scoresPanel = document.getElementById('scoresPanel');
            const lockBtn = document.getElementById('lockBtn');
            const pinInput = document.getElementById('pinInput');
            const pinError = document.getElementById('pinError');

            const TOKEN_KEY = 'zuzu-admin-token';
            function getToken() { try { return localStorage.getItem(TOKEN_KEY) || ''; } catch (e) { return ''; } }
            function tokenValid() {
                const tok = getToken();
                if (!tok || tok.indexOf('.') < 0) return false;
                try {
                    const payload = JSON.parse(atob(tok.split('.')[0]));
                    return payload && typeof payload.exp === 'number' && Date.now() <= payload.exp;
                } catch (e) { return false; }
            }

            function showPanel() {
                lockForm.classList.add('admin-hidden');
                settingsForm.classList.remove('admin-hidden');
                scoresPanel.classList.remove('admin-hidden');
                lockBtn.classList.remove('admin-hidden');
                populate();
                document.dispatchEvent(new CustomEvent('admin:unlocked', { detail: { token: getToken() } }));
            }
            function showLock() {
                settingsForm.classList.add('admin-hidden');
                scoresPanel.classList.add('admin-hidden');
                lockBtn.classList.add('admin-hidden');
                lockForm.classList.remove('admin-hidden');
                pinInput.value = '';
                pinInput.focus();
                document.dispatchEvent(new CustomEvent('admin:locked'));
            }

            // Remember a valid session on this device so the organizer isn't re-prompted.
            if (tokenValid()) showPanel();

            lockForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                pinError.classList.add('admin-hidden');
                const pin = pinInput.value;
                try {
                    const res = await fetch('/.netlify/functions/admin-login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pin }),
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok && data.token) {
                        try { localStorage.setItem(TOKEN_KEY, data.token); } catch (e2) { /* ignore */ }
                        showPanel();
                    } else {
                        pinError.textContent = data.error === 'not_configured'
                            ? t('admin.notConfigured')
                            : t('admin.wrongPin');
                        pinError.classList.remove('admin-hidden');
                    }
                } catch (err) {
                    pinError.textContent = t('admin.wrongPin');
                    pinError.classList.remove('admin-hidden');
                }
            });

            lockBtn.addEventListener('click', function () {
                try { localStorage.removeItem(TOKEN_KEY); } catch (e) { /* ignore */ }
                showLock();
            });

            // If a score write reports the session has expired, force re-login.
            document.addEventListener('admin:sessionExpired', showLock);

            // ---- Settings form ----
            const courtCount = document.getElementById('courtCount');
            const refreshSeconds = document.getElementById('refreshSeconds');
            const tMen = document.getElementById('tMen');
            const tWomen = document.getElementById('tWomen');

            function populate() {
                const s = getSettings();
                courtCount.value = s.courtCount;
                refreshSeconds.value = s.refreshSeconds;
                tMen.checked = s.tournaments.includes('men');
                tWomen.checked = s.tournaments.includes('women');
                const r = document.querySelector(`input[name="defaultLang"][value="${s.defaultLang}"]`);
                if (r) r.checked = true;
            }

            settingsForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const tournaments = [];
                if (tMen.checked) tournaments.push('men');
                if (tWomen.checked) tournaments.push('women');
                if (tournaments.length === 0) { tournaments.push('men', 'women'); tMen.checked = tWomen.checked = true; }
                const defaultLang = document.querySelector('input[name="defaultLang"]:checked').value;

                saveSettings({
                    courtCount: parseInt(courtCount.value, 10) || 0,
                    refreshSeconds: parseInt(refreshSeconds.value, 10) || 10,
                    tournaments: tournaments,
                    defaultLang: defaultLang,
                });
                if (typeof setLang === 'function') setLang(defaultLang);

                const btn = document.getElementById('saveBtn');
                const original = btn.textContent;
                btn.textContent = t('settings.saved');
                btn.style.background = 'var(--success)';
                setTimeout(() => { btn.textContent = original; btn.style.background = ''; }, 1500);
            });

            document.getElementById('resetBtn').addEventListener('click', function () {
                saveSettings(Object.assign({}, DEFAULT_SETTINGS));
                populate();
            });
        });
    </script>
</body>
</html>
