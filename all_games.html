<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title data-i18n="page.allGamesTitle">All Games - ZuZu Beach Turnier</title>
    <link rel="icon" type="image/png" href="ZuZU.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="all-games-page">
    <header class="site-header">
        <div class="container">
            <a href="index.html" class="site-brand">
                <img src="ZuZU.png" alt="ZuZu Beach" class="site-brand-logo">
                <span class="site-brand-text" data-i18n="brand.tagline">Turnier</span>
            </a>
            <div class="lang-toggle" id="langToggle" role="group" aria-label="Language">
                <button type="button" data-lang="de">DE</button>
                <button type="button" data-lang="en">EN</button>
            </div>
        </div>
    </header>
    <div class="container">
        <main class="main-content">
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i>
                <span data-i18n="nav.back">Zurück zur Startseite</span>
            </a>

            <div class="page-header">
                <h2 class="page-title">
                    <i class="fas fa-list"></i>
                    <span data-i18n="heading.allGames">All Games</span>
                </h2>
                <button id="refreshButton" class="refresh-button">
                    <i class="fas fa-sync-alt"></i>
                    <span data-i18n="nav.refresh">Refresh</span>
                </button>
            </div>

            <div class="loading-section" id="loading">
                <div class="loading"></div>
                <p data-i18n="loading.allGames">Lade alle Spiele...</p>
            </div>

            <div class="matches-section" id="matchesSection" style="display: none;">
                <div class="tournament-filter">
                    <label for="tournamentFilter" data-i18n="filter.tournament">Turnier:</label>
                    <select id="tournamentFilter" class="filter-select">
                        <option value="men">U20 Herren (U20M)</option>
                        <option value="women">U20 Damen (U20F)</option>
                    </select>
                </div>
                
                <div class="matches-list" id="matchesList">
                    <!-- All matches will be populated by JavaScript -->
                </div>
            </div>

            <div class="no-matches" id="noMatches" style="display: none;">
                <i class="fas fa-calendar-times"></i>
                <h3 data-i18n="empty.noMatchesTitle">Keine Spiele verfügbar</h3>
                <p data-i18n="empty.noMatchesAllGames">Es sind derzeit keine Spiele geplant.</p>
            </div>
        </main>

        <footer class="footer">
            <p data-i18n="footer.copyright">&copy; 2025 ZuZu Beach Turnier Kloten</p>
        </footer>
    </div>

    <script src="i18n.js"></script>
    <script src="script.js"></script>
    <script>
        // Load all games when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadAllGames();
        });
    </script>
</body>
</html>
